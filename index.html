<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/favicon.ico" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0a0a14" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="subcanvas" />
    <title>subcanvas — examples</title>
    <script>
      (function () {
        var valid = ['#screen-size', '#window-mobile', '#single', '#multiple', '#window', '#pixi-confirm', '#component-window', '#component-confirm', '#component-image', '#component-loading', '#component-bus', '#component-scrollable', '#component-clickable-image', '#component-scrollable-image', '#component-picture-drag', '#component-video-player'];
        var h = window.location.hash;
        if (h && h !== '#' && valid.indexOf(h) < 0) {
          window.location.replace('#');
        }
      })();
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js').then(function (reg) {
            if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
            reg.addEventListener('updatefound', function () {
              var sw = reg.installing;
              if (!sw) return;
              sw.addEventListener('statechange', function () {
                if (sw.state === 'installed' && navigator.serviceWorker.controller) {
                  if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
                }
              });
            });
            navigator.serviceWorker.addEventListener('controllerchange', function () {
              if (window.__swReloading) return;
              window.__swReloading = true;
              window.location.reload();
            });
          }).catch(function () {});

          if (navigator.serviceWorker.controller) {
            navigator.serviceWorker.addEventListener('message', function (e) {
              if (e.data && e.data.type === 'SW_UPDATED') {
                navigator.serviceWorker.controller && navigator.serviceWorker.controller.postMessage({ type: 'SKIP_WAITING' });
              }
            });
          }
        });
      }
    </script>
    <script>
      (function () {
        function paintError(title, body) {
          var el = document.getElementById('root') || document.body;
          el.innerHTML = '';
          var wrap = document.createElement('div');
          wrap.style.cssText = 'position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:#1a0a14;color:#ffd0d0;font-family:system-ui,sans-serif;text-align:center;z-index:2147483647;overflow:auto;';
          var h = document.createElement('h1');
          h.textContent = title;
          h.style.cssText = 'font-size:1.2rem;margin:0 0 12px;';
          var p = document.createElement('pre');
          p.textContent = body;
          p.style.cssText = 'font-size:0.85rem;max-width:90vw;white-space:pre-wrap;text-align:left;background:#0a0a14;padding:12px;border-radius:8px;border:1px solid #4a1a1a;';
          wrap.appendChild(h);
          wrap.appendChild(p);
          el.appendChild(wrap);
        }
        window.__paintError = paintError;
        window.addEventListener('error', function (e) {
          var msg = (e.error && (e.error.stack || e.error.message)) || e.message || 'unknown error';
          paintError('Runtime error', String(msg));
        });
        window.addEventListener('unhandledrejection', function (e) {
          var r = e.reason;
          var msg = r && (r.stack || r.message) ? (r.stack || r.message) : String(r);
          paintError('Unhandled rejection', msg);
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>This app requires JavaScript.</noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
