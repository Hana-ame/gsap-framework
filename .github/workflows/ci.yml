name: CI

on:
  push:
    branches: [sim, main]
  pull_request:
    branches: [sim, main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npx tsc --noEmit -p tsconfig.app.json

      - run: npm test

      - run: npm run build
