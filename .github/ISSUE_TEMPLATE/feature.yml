name: Feature Request
description: Propose a new capability for the sim app
title: '[feat] '
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Use this template to propose a new feature.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: User-facing problem, not the solution.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Sketch the API, UX, or behavior.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: We considered X, but it conflicts with Y.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links, related issues.
    validations:
      required: false
