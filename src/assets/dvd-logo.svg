<!-- ============================================================
     文件: src/assets/dvd-logo.svg
     用途: 更美观的DVD屏保测试图片，包含彩虹渐变背景和带描边的DVD文字。
           在PixiJS中作为纹理加载，用于反弹动画。
     上下文: 被 bounce.plugin.ts 加载并创建精灵。
     
     Outline:
     - 使用SVG格式，包含一个圆角矩形背景，填充彩虹对角线渐变。
     - 添加阴影滤镜增强立体感。
     - 白色DVD文字加黑色描边，确保在各种背景下清晰可见。
     - 尺寸保持200x100，兼容现有碰撞检测逻辑。
     
     使用方法:
       在PixiJS中通过 PIXI.Assets.load 加载此SVG，生成纹理。
     
     注意事项:
       确保SVG文件路径正确，PixiJS会自动将其转换为纹理。
       此版本比之前的渐变更鲜艳，视觉效果更佳。
     ============================================================ -->
<svg width="200" height="100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 彩虹对角线渐变 -->
    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff0000" />
      <stop offset="16%" stop-color="#ff7f00" />
      <stop offset="33%" stop-color="#ffff00" />
      <stop offset="50%" stop-color="#00ff00" />
      <stop offset="66%" stop-color="#0000ff" />
      <stop offset="83%" stop-color="#4b0082" />
      <stop offset="100%" stop-color="#9400d3" />
    </linearGradient>
    <!-- 阴影滤镜 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- 圆角矩形背景，应用彩虹渐变和阴影 -->
  <rect width="200" height="100" rx="20" ry="20" fill="url(#rainbow)" filter="url(#shadow)" />
  <!-- DVD文字，白色填充，黑色描边 -->
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-size="48" font-family="Arial, sans-serif" font-weight="bold" fill="white" stroke="black" stroke-width="2">DVD</text>
</svg>